name: Deploy Paris Trip Site

on:
  push:
    branches: ["main"]
    paths:
      - "paris_trip_site/**"
      - ".github/workflows/deploy-paris-site.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./paris_trip_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
